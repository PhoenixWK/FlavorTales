name: Protect Infrastructure Branch

on:
  pull_request:
    branches:
      - infrastructure

jobs:
  check-allowed-sources:
    name: Check PR source is backend or frontend
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          echo "Source branch: $SOURCE_BRANCH"
          
          if [ "$SOURCE_BRANCH" != "backend" ] && [ "$SOURCE_BRANCH" != "frontend" ]; then
            echo "❌ ERROR: Chỉ nhánh 'backend' hoặc 'frontend' được phép merge vào 'infrastructure'!"
            exit 1
          fi
          
          echo "✅ Source branch hợp lệ: $SOURCE_BRANCH"