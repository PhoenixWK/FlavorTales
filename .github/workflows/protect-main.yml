name: Protect Main Branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    name: Check PR must come from infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          echo "Source branch: $SOURCE_BRANCH"
          
          if [ "$SOURCE_BRANCH" != "infrastructure" ]; then
            echo "❌ ERROR: Pull Request vào 'main' chỉ được phép từ nhánh 'infrastructure'!"
            echo "👉 Hãy merge '$SOURCE_BRANCH' vào 'infrastructure' trước."
            exit 1
          fi
          
          echo "✅ Source branch hợp lệ: $SOURCE_BRANCH"