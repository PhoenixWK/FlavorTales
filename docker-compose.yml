services:

  mysql-primary:
    image: mysql:8.0
    container_name: flavortales-primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: flavortales
    ports:
      - "3308:3306"
    command:
      - --performance-schema=ON
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-expire-logs-seconds=604800
    volumes:
      - flavortales-primary-data:/var/lib/mysql
      - ../database/mysql/mysql_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/mysql/primary-init.sql:/docker-entrypoint-initdb.d/02-replication.sql:ro
      - ../database/mysql/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-replicate:
    image: mysql:8.0
    container_name: flavortales-replicate
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: flavortales
    ports:
      - "3309:3306"
    command:
      - --performance-schema=ON
      - --server-id=2
      - --relay-log=relay-bin
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --read-only=ON
    volumes:
      - flavortales-replicate-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql-primary:
        condition: service_healthy

  replication-setup:
    image: mysql:8.0
    container_name: flavortales-replication-setup
    restart: on-failure
    volumes:
      - ../database/mysql/replica-setup.sh:/replica-setup.sh:ro
    entrypoint: ["/bin/bash", "/replica-setup.sh"]
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replicate:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: flavortales-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - flavortales-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pmm-server:
    image: percona/pmm-server:2
    container_name: pmm-server
    restart: always
    ports:
      - "8081:80"
    volumes:
      - pmm-data:/srv

  pmm-client:
    image: percona/pmm-client:2
    container_name: pmm-client
    restart: always
    environment:
      PMM_AGENT_SERVER_ADDRESS: pmm-server:443
      PMM_AGENT_SERVER_INSECURE_TLS: "true"
    depends_on:
      - pmm-server

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DB connections to use Docker service hostnames (not localhost/tunnels)
      SPRING_DATASOURCE_MASTER_JDBC_URL: jdbc:mysql://mysql-primary:3306/flavortales
      SPRING_DATASOURCE_SLAVE_JDBC_URL: jdbc:mysql://mysql-replicate:3306/flavortales
      SPRING_DATASOURCE_MASTER_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_MASTER_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_DATASOURCE_SLAVE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_SLAVE_PASSWORD: ${DB_PASSWORD:-root}
      # JWT
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      # Mail
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      # CORS – allow requests from the browser-facing frontend origin
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replicate:
        condition: service_healthy
      replication-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        - NEXT_PUBLIC_R2_PUBLIC_URL=${NEXT_PUBLIC_R2_PUBLIC_URL:-https://cdn.flavortales.site}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      - NEXT_PUBLIC_R2_PUBLIC_URL=${NEXT_PUBLIC_R2_PUBLIC_URL:-https://cdn.flavortales.site}
      # Server-side BFF routes use the Docker service hostname (not localhost)
      - INTERNAL_API_BASE_URL=http://backend:8080
      - COOKIE_SECURE=true
    depends_on:
      - backend
    restart: on-failure

  # Cloudflare Tunnel – exposes flavortales.site (frontend) and
  # api.flavortales.site (backend) without opening any inbound ports.
  # Configure public hostnames in Cloudflare Zero Trust dashboard:
  #   flavortales.site     → http://frontend:3000
  #   api.flavortales.site → http://backend:8080
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flavortales-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

volumes:
  flavortales-primary-data:
  flavortales-replicate-data:
  flavortales-redis-data:
  pmm-data: